# Workflow for generating image used for social links
name: Generate social preview

on:
  # Allow for manual run
  workflow_dispatch:

  push:
  # Run automatically when preview components are pushed
    branches:
      - main
    paths:
      - social-preview.html
      - images/app-icon.png
      - scripts/generate-social-preview.js
      - package.json
      - package-lock.json
      - .github/workflows/generate-social-preview.yml

# Needs write to commit preview image
permissions:
  contents: write

jobs:
  generate:
    name: Generate social preview card
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Inspect npm output
        run: |
          echo "Current directory:"
          pwd
      
          echo "Root files:"
          ls -la
      
          echo "npm package-lock setting:"
          npm config get package-lock
      
          echo "Git status:"
          git status --short

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate image
        run: npm run generate-social-preview

      - name: Commit changed image
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- images/social-preview.png)" ]; then
            echo "Social preview did not change."
            exit 0
          fi

          git config user.name "WoWS Preview Bot"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add images/social-preview.png
          git commit -m "Update social preview"
          git push

      - name: Commit lock file and preview
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- package-lock.json images/social-preview.png)" ]; then
            echo "No generated files changed."
            exit 0
          fi
      
          git status --short -- package-lock.json images/social-preview.png
      
          git config user.name "WoWS Preview Bot"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add package-lock.json images/social-preview.png
          git commit -m "Generate social preview"
          git push