# Callable workflow for deploying the static content to GitHub Pages
name: Deploy static content to Pages

on:
  # This workflow can only be called and requires a reference
  workflow_call:
    inputs:
      deploy_ref:
        description: Git branch, tag, or commit SHA to deploy
        required: true
        type: string

    outputs:
      page_url:
        description: URL of the deployed GitHub Pages site
        value: ${{ jobs.deploy.outputs.page_url }}

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: pages-deploy
  cancel-in-progress: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Build /dist and deploy
jobs:
  deploy:
    name: Build and deploy to pages

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Prepare deployment files
        shell: bash
        run: |
          set -euo pipefail

          # Clean /dist
          rm -rf dist
          mkdir -p dist

          # Copy in required files
          cp index.html dist/
          cp -r styles dist/
          cp -r src dist/
          cp -r images dist/
          cp -r data dist/

          # Optional files: copy them only when they are added.
          if [ -f favicon.ico ]; then
            cp favicon.ico dist/
          fi

          if [ -f CNAME ]; then
            cp CNAME dist/
          fi

          if [ -f 404.html ]; then
            cp 404.html dist/
          fi

      - name: Show deployment contents
        run: |
          echo "Files that will be deployed:"
          find dist -maxdepth 3 -type f | sort

      - name: Configure Github Pages
        uses: actions/configure-pages@v5

      - name: Upload Github Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5