<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Preview</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 1200px;
            height: 630px;
            margin: 0;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;

            font-family:
                Inter,
                system-ui,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;

            color: #f8fafc;

            background:
                radial-gradient(
                    circle at 80% 20%,
                    rgba(56, 189, 248, 0.18),
                    transparent 38%
                ),
                linear-gradient(
                    135deg,
                    #020617 0%,
                    #0f172a 55%,
                    #172554 100%
                );
        }

        .preview {
            width: 1060px;
            display: grid;
            grid-template-columns: 300px 1fr;
            align-items: center;
            gap: 64px;
        }

        .logo {
            width: 280px;
            height: 280px;
            object-fit: contain;
            filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.45));
        }

        .eyebrow {
            margin: 0 0 12px;

            color: #7dd3fc;
            font-size: 25px;
            font-weight: 650;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 700px;
            margin: 0;

            font-size: 70px;
            line-height: 1.02;
            letter-spacing: -0.035em;
        }

        .description {
            max-width: 690px;
            margin: 28px 0 0;

            color: #cbd5e1;
            font-size: 29px;
            line-height: 1.38;
        }

        .features {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .feature {
            padding: 10px 16px;

            color: #bae6fd;
            font-size: 19px;
            font-weight: 600;

            background: rgba(14, 165, 233, 0.12);
            border: 1px solid rgba(125, 211, 252, 0.28);
            border-radius: 999px;
        }

        .url {
            position: absolute;
            right: 48px;
            bottom: 36px;

            color: #94a3b8;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <main class="preview">
        <img
            class="logo"
            src="images/app-icon.png"
            alt=""
        >

        <div>
            <p class="eyebrow">World of Warships</p>

            <h1>Collection Calc</h1>

            <p class="description">
                Estimate how many containers and resources are needed to complete a collection.
            </p>

            <div class="features">
                <span class="feature">Collection presets</span>
                <span class="feature">Container estimate</span>
                <span class="feature">Cost range</span>
            </div>
        </div>
    </main>

    <div class="url">
        heykrystal.github.io/wows-collection-calc
    </div>
</body>
</html>
